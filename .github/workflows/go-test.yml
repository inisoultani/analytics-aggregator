name: Go Unit Tests

on:
  push:
    branches: ["main"] # Trigger on pushes to main
  pull_request:
    branches: ["main"] # Trigger on pull requests to main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.13" # Replace with your required Go version
          cache: true # Automatically caches dependencies for speed

      - name: Install dependencies
        run: go mod tidy

      - name: Run Tests
        run: go test -v ./...
